<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workout Slot Machine - High-Energy Fitness Generator</title>
  <meta name="description" content="Een interactieve, arcade-achtige workout-fruitautomaat voor energieke groepslessen in de gym. Genereer willekeurige oefeningen en timers met lokale instructievideo's.">
  
  <!-- CSS Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app-container">
    <!-- Header -->
    <header>
      <h1 class="logo" id="main-title">Workout <span>Slots</span></h1>

      <!-- Live clock + class end countdown -->
      <div class="header-clock">
        <div class="header-clock-time" id="header-current-time">--:--</div>
        <div class="header-clock-end" id="header-class-end">LES EINDIGT: --:--</div>
        <div class="header-clock-remaining" id="header-remaining"></div>
      </div>
      
      <div class="header-controls">
        <!-- Auto-play indicator/stop button -->
        <button id="autoplay-stop-btn" class="btn btn-pink" aria-label="Stop auto-play" title="Stop automatisch draaien" style="display:none;">
          ⏹ AUTO
        </button>
        <!-- Sound FX toggle button -->
        <button id="audio-toggle-btn" class="btn btn-cyan btn-icon" aria-label="Toggle geluidseffecten" title="Geluidseffecten aan/uit">
          <span class="btn-icon-symbol">🔊</span>
        </button>
        <!-- Admin Settings button -->
        <button id="admin-open-btn" class="btn btn-cyan" aria-label="Open instellingen" title="Instellingen openen">
          ⚙️ <span style="margin-left: 5px;">INSTELLINGEN</span>
        </button>
      </div>
    </header>

    <main id="app-main" class="app-main state-idle">

      <!-- FLASH OVERLAY: "Lekker bezig!" flashes on top, then fades -->
      <div id="finished-overlay" class="finished-overlay" aria-live="polite">
        <div class="finished-overlay-content">
          <div class="finished-overlay-title">LEKKER BEZIG! 🔥</div>
          <p id="finished-exercise-text" class="finished-overlay-sub">Oefening afgerond.</p>
        </div>
      </div>

      <!-- TWO COLUMN LAYOUT: Left (Spinner + Timer) | Right (Video + Instructions) -->
      <div class="left-main-column">
        <!-- SLOT MACHINE -->
        <div class="slot-machine-panel" id="slot-machine-panel">
          <div class="slot-machine-cabinet border-pulse-pink">
            <div class="reels-wrapper">
              <div class="reel-viewport" id="reel-viewport-material">
                <div class="reel-selection-frame"></div>
                <div class="reel-strip" id="reel-material">
                  <div class="reel-card">---</div>
                </div>
              </div>
              <div class="reel-viewport" id="reel-viewport-exercise">
                <div class="reel-selection-frame"></div>
                <div class="reel-strip" id="reel-exercise">
                  <div class="reel-card">---</div>
                </div>
              </div>
              <div class="reel-viewport" id="reel-viewport-time">
                <div class="reel-selection-frame"></div>
                <div class="reel-strip" id="reel-time">
                  <div class="reel-card">---</div>
                </div>
              </div>
            </div>
            <div class="slot-controls">
              <button id="spin-btn" class="spin-button">SPIN</button>
            </div>
          </div>
        </div>

        <!-- TIMER PANEL -->
        <div class="unified-timer-panel" id="unified-timer-panel">
          <!-- Label: "MAAK JE KLAAR" during countdown, hidden during active -->
          <div class="unified-timer-label" id="unified-timer-label">MAAK JE KLAAR</div>
          <!-- The big number — used for both countdown and workout timer -->
          <div class="unified-timer-circle-wrap">
            <svg class="timer-svg" viewBox="0 0 480 480">
              <circle class="timer-track" cx="240" cy="240" r="220"></circle>
              <circle id="timer-progress-circle" class="timer-progress" cx="240" cy="240" r="220"></circle>
            </svg>
            <div id="timer-digits" class="timer-digits">10</div>
          </div>
          <!-- Trainer buttons (below timer) -->
          <nav class="trainer-bar" id="trainer-bar" aria-label="Trainer bediening">
            <button id="btn-pause" class="btn btn-cyan">
              ⏸ <span style="margin-left:5px;">PAUZE</span>
            </button>
            <button id="btn-skip" class="btn btn-cyan">
              ⏭ <span style="margin-left:5px;">AFRONDEN</span>
            </button>
            <button id="btn-reset" class="btn btn-pink">
              🔄 <span style="margin-left:5px;">STOP</span>
            </button>
          </nav>
        </div>
      </div>

      <div class="right-main-column" id="right-panel">
        <!-- Exercise name + material -->
        <div class="exercise-header">
          <h2 id="hud-exercise-name" class="hud-exercise-name">---</h2>
          <div id="hud-material-info" class="hud-material-info">---</div>
        </div>
        <!-- Video slot -->
        <div class="video-slot" id="video-slot">
          <iframe
            id="workout-video-iframe"
            src=""
            frameborder="0"
            allow="autoplay; encrypted-media"
            allowfullscreen
            style="display:none;"
          ></iframe>
          <img id="video-fallback-img" class="video-fallback-img" src="" alt="" style="display:none;">
        </div>
        <!-- Instruction card -->
        <div class="instruction-card">
          <div class="instruction-title">Instructie</div>
          <p id="instruction-text" class="instruction-text">---</p>
        </div>
      </div>



    </main>

    <!-- Background scrim for admin overlay -->
    <div id="scrim" class="scrim"></div>

    <!-- Admin Settings Slide-out drawer -->
    <aside id="admin-overlay" class="admin-overlay" aria-labelledby="admin-title">
      <div class="admin-header">
        <h2 id="admin-title">Workout Config</h2>
        <button id="admin-close-btn" class="admin-close" aria-label="Sluit instellingen">✕</button>
      </div>

      <div class="admin-content">
        <section class="admin-section">
          <h3>Timer &amp; Les instellingen</h3>
          <div class="settings-grid">
            <div class="input-group">
              <label for="min-time-input">Min. werktijd (sec)</label>
              <input type="number" id="min-time-input" min="10" step="10" value="30">
            </div>
            <div class="input-group">
              <label for="max-time-input">Max. werktijd (sec)</label>
              <input type="number" id="max-time-input" min="10" step="10" value="120">
            </div>
            <div class="input-group">
              <label for="countdown-time-input">Maak je klaar (sec)</label>
              <input type="number" id="countdown-time-input" min="1" max="60" step="1" value="10">
            </div>
            <div class="input-group">
              <label for="class-end-input">Les eindigt om</label>
              <input type="time" id="class-end-input" value="">
            </div>
            <div class="input-group">
              <label for="volume-input">Volume (%)</label>
              <input type="number" id="volume-input" min="0" max="300" step="10" value="200">
            </div>
            <div class="input-group">
              <label for="require-video-input">Alleen met video</label>
              <div class="toggle-row">
                <input type="checkbox" id="require-video-input" class="toggle-checkbox" checked>
                <label for="require-video-input" class="toggle-label"></label>
              </div>
            </div>
            <div class="input-group">
              <label for="autoplay-input">Auto-play (tot les einde)</label>
              <div class="toggle-row">
                <input type="checkbox" id="autoplay-input" class="toggle-checkbox">
                <label for="autoplay-input" class="toggle-label"></label>
              </div>
            </div>
          </div>
          <p style="font-size: 0.75rem; color: #8888aa; margin-top: 0.4rem;">
            * Werktijd wordt willekeurig geselecteerd, afgerond op 10 seconden.
          </p>
        </section>
        <section class="admin-section" style="flex: 1; display: flex; flex-direction: column;">
          <h3>Materialen & Oefeningen</h3>
          
          <div class="selector-list-header">
            <button id="select-all-btn" class="btn-small">Alles selecteren</button>
            <button id="deselect-all-btn" class="btn-small">Alles de-selecteren</button>
          </div>

          <input type="text" id="search-bar" class="search-bar" placeholder="Zoek op materiaal of oefening...">

          <div id="database-tree" class="database-tree">
            <!-- Populated dynamically via JS -->
            <p style="padding: 1rem; color: #888;">Database wordt geladen...</p>
          </div>
        </section>
      </div>

      <div class="admin-footer">
        <button id="admin-save-btn" class="btn btn-cyan" style="width: 100%; justify-content: center;">
          OPSLAAN & SLUITEN
        </button>
      </div>
    </aside>

  </div>

  <!-- Application Modules -->
  <script src="audio.js"></script>
  <script src="timer.js"></script>
  <script src="slotmachine.js"></script>
  <script src="app.js"></script>

</body>
</html>
